name: CI

on:
  push:
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: gofmt -l internal/ cmd/
      - run: test -z "$(gofmt -l internal/ cmd/)" || (echo "Go files not formatted:" && gofmt -l internal/ cmd/ && exit 1)
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      - run: npm ci
        working-directory: web
      - run: npx tsc --noEmit
        working-directory: web
      - run: npm test
        working-directory: web
