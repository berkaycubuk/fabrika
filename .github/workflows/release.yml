name: Release

# On a vX.Y.Z tag push, GoReleaser builds the UI, cross-compiles the binaries,
# packages the .deb, and uploads everything to the R2 bucket. A final step pushes
# install.sh to the bucket's base path. Cut a release with: make tag VERSION=v0.1.0
on:
  push:
    tags:
      - 'v*'
  # Manual launch from the Actions tab (or `gh workflow run release.yml -f tag=v0.1.0`)
  # against an existing tag — no new tag needed.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re)release, e.g. v0.1.0'
        required: true

permissions:
  contents: read # just checks out the source; artifacts go to R2, not a GitHub release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # GoReleaser needs full history + tags
          # On a tag push this is empty → uses the pushed tag. On manual
          # dispatch it checks out the tag you entered.
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          # No GitHub release (private source) — artifacts upload to R2 via the
          # blobs uploader using these S3-compatible credentials.
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      # The install.sh lives at the bucket's base path (not per-version), so the
      # curl one-liner is stable. Re-uploaded each release to keep it current.
      - name: Upload install.sh to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 cp install.sh \
            s3://public-stuff/tool-binaries/fabrika/install.sh \
            --endpoint-url https://6225e73450cd1a0a1e9121273f8a6111.r2.cloudflarestorage.com \
            --content-type text/x-shellscript

