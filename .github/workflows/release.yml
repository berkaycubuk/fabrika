name: Release

# On a vX.Y.Z tag push, GoReleaser builds the UI, cross-compiles the binaries,
# packages the .deb, updates the Homebrew tap, and publishes the GitHub Release.
# Cut one with: make tag VERSION=v0.1.0
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # create the release and upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # GoReleaser needs full history + tags
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Repo-scoped PAT that can push to berkaycubuk/homebrew-tap.
          # Add under Settings → Secrets → Actions. Required only for the brew step.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
