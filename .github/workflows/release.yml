name: Release

# On a vX.Y.Z tag push, GoReleaser builds the UI, cross-compiles the binaries,
# packages the .deb, and publishes everything as a GitHub release on the tag.
# Cut a release with: make tag VERSION=v0.1.0
on:
  push:
    tags:
      - 'v*'
  # Manual launch from the Actions tab (or `gh workflow run release.yml -f tag=v0.1.0`)
  # against an existing tag — no new tag needed.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re)release, e.g. v0.1.0'
        required: true

permissions:
  contents: write # GoReleaser creates the GitHub release and uploads assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # GoReleaser needs full history + tags
          # On a tag push this is empty → uses the pushed tag. On manual
          # dispatch it checks out the tag you entered.
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
