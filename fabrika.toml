[project]
  name = "Fabrika"

[verbs]
  setup = "cd web && npm install --silent"
  build = "make build"
  test = "go test ./..."
  lint = ""
  typecheck = "cd web && npx tsc --noEmit"
  verify = ""
  e2e = ""
  run = ""

[risk]
  high = ["**/migrations/**", "**/*.sql", "internal/store/**"]
  medium = ["internal/api/**", "internal/engine/**"]

[autonomy]
  auto_merge = ["low"]
  escalate = ["medium", "high"]
