# GoReleaser config — builds the release artifacts and publishes them as a
# GitHub release on the tag.
# Validate locally:  goreleaser check
# Dry-run a build:   make dist   (== goreleaser release --snapshot --clean)
# Cut a real release: make tag VERSION=v0.1.0  (pushes the tag; CI does the rest)
version: 2

project_name: fabrika

before:
  hooks:
    # The web UI is embedded via go:embed, so web/dist must exist before the Go
    # build. Built once here; every platform binary embeds the same assets.
    - bash -c "cd web && npm ci && npm run build"

builds:
  - id: fabrika
    main: ./cmd/fabrika
    binary: fabrika
    env:
      - CGO_ENABLED=0 # pure-Go sqlite → cross-compile without a C toolchain
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Tag }}

archives:
  - id: fabrika
    formats: [tar.gz]
    # Version-less filenames — `releases/latest/download/<asset>` resolves the
    # newest release, so install.sh needs no version in the asset name.
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

# Debian/Ubuntu package: installs fabrika to /usr/bin via apt.
nfpms:
  - id: fabrika
    package_name: fabrika
    vendor: Berkay Cubuk
    homepage: https://github.com/berkaycubuk/fabrika
    maintainer: Berkay Cubuk <berkay@berkaycubuk.com>
    description: Single Go binary orchestrating local coding agents.
    formats:
      - deb
    bindir: /usr/bin
    # Version-less name to match the archives.
    file_name_template: "{{ .ProjectName }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  use: git
  sort: asc

release:
  github:
    owner: berkaycubuk
    name: fabrika
  # Re-running the workflow against an existing tag replaces the artifacts
  # instead of failing on the existing release.
  mode: replace
  footer: |
    ## Install

    ```sh
    curl -fsSL https://raw.githubusercontent.com/berkaycubuk/fabrika/main/install.sh | sh
    ```
